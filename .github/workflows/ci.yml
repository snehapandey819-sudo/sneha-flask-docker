name: CI/CD Pipeline

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2
      - run: docker build -t sneha-app .

  test:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - run: echo "Test passed"

  deploy:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - run: echo "Deploy done"
